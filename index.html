<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Maze</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-menu" class="main-menu" aria-live="polite">
    <div class="main-menu-panel">
      <div class="menu-kicker">Echo Maze</div>
      <h1 id="menu-title" class="menu-title">Echo Maze</h1>
      <p id="menu-subtitle" class="menu-subtitle"></p>

      <div id="menu-main-actions" class="menu-actions">
        <button id="menu-start" class="menu-button is-primary" type="button"></button>
        <button id="menu-controls" class="menu-button" type="button"></button>
        <button id="menu-language" class="menu-button" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
        <div id="language-picker" class="language-picker is-hidden" role="listbox"></div>
      </div>

      <div id="controls-panel" class="controls-panel is-hidden">
        <div class="controls-header">
          <div>
            <div id="controls-title" class="controls-title"></div>
            <div id="controls-hint" class="controls-hint"></div>
          </div>
          <button id="controls-back" class="menu-button is-small" type="button"></button>
        </div>
        <div id="controls-list" class="controls-list"></div>
        <button id="controls-reset" class="menu-button is-small" type="button"></button>
      </div>
    </div>
  </div>

  <div id="device-block" class="device-block is-hidden" aria-live="assertive">
    <div class="device-block-panel">
      <div class="device-block-kicker">Echo Maze</div>
      <h2>Desktop build only</h2>
      <p>Echo Maze needs a keyboard, precise controls and a wide screen. Open it on a desktop or laptop browser with the window enlarged.</p>
    </div>
  </div>

  <div id="cinematic-overlay" class="cinematic-overlay is-hidden" aria-hidden="true">
    <video id="story-video" class="story-video" playsinline></video>
    <div class="cinematic-vignette"></div>
    <div id="cinematic-caption" class="cinematic-caption"></div>
  </div>

  <div id="rules-overlay" class="rules-overlay is-hidden" aria-hidden="true">
    <div class="rules-panel" role="dialog" aria-modal="true" aria-labelledby="rules-title">
      <div class="rules-kicker">Echo Protocol</div>
      <h2 id="rules-title"></h2>
      <p id="rules-body"></p>
      <div id="rules-continue" class="rules-continue"></div>
    </div>
  </div>

  <div id="stage">
    <!-- Fascia HUD superiore: vita, monete, arma, abilita, minimappa (in milestone successive) -->
    <div id="hud-top" class="hud"></div>

    <!-- Area di gioco -->
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="ability-panel" class="ability-side-panel is-hidden" aria-label="Acquired abilities"></div>
    </div>

    <!-- Fascia HUD inferiore: slot consumabili -->
    <div id="hud-bottom" class="hud"></div>
  </div>

  <div id="shop-overlay" class="shop-overlay is-hidden" aria-hidden="true">
    <div class="shop-panel" role="dialog" aria-modal="true" aria-labelledby="shop-title">
      <div class="shop-header">
        <div>
          <div id="shop-title" class="shop-title"></div>
          <div id="shop-subtitle" class="shop-subtitle"></div>
        </div>
        <button id="shop-close" class="shop-close" type="button" aria-label="Close shop">×</button>
      </div>
      <div id="shop-list" class="shop-list"></div>
      <div id="shop-feedback" class="shop-feedback"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
